<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body{
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box{
            background: white;
            padding: 30px;
            width: 300px;
            border-radius: 20px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2{
            margin-bottom: 20px;
        }

        input{
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid gray;
            border-radius: 10px;
            outline: none;
        }

        button{
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

        p{
            margin-top: 15px;
        }

        a{
            text-decoration: none;
            color: blue;
        }

    </style>
</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <form>
            <input type="text" placeholder="Enter Username" required>

            <input type="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>

            <p>Don't have an account? <a href="#">Register</a></p>
        </form>
    </div>

</body>
</html>
